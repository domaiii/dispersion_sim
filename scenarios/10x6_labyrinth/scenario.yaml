name: 10x6_labyrinth
geometry:
  mesh: geometry/labyrinth_2d_coarse.msh
  occupancy_yaml: geometry/occupancy.yaml
  occupancy_image: geometry/occupancy.pgm
  wall_pattern: wall|obstacle
  outflow_pattern: outlet|outflow
data:
  wind_csv: wind_gt.csv
  sample_dir: samples
  result_dir: results
measurement_noise:
  wind_noise_std: 0.0
ground_truth_slicing:
  z_height: 0.025
  z_tol: 0.025
  max_xy_dist: 0.2
ns_solver_parameters:
  solver: minimum_residual
  regularization: smooth
  maxit: 40
  tol: 0.01
  damping: null
  viscosity: 1.0e-04
  weight_misfit: 100.0
  weight_pde_res: 1.0
  weight_reg: 0.1
  weight_boundary: 10000.0
gmrf_parameters:
  cell_size: 0.1
  var_speed: 0.01
  var_direction: 0.01
  batch_size: 25
gp_parameters:
  length_scale: 1.0
  optimize_length_scale: true
meta:
  description: 10x6 room with labyrinth profile
wind_sample_sizes:
- 10
- 25
- 50
- 100
- 200
- 400


